<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORES HV — Console</title>
<script>document.documentElement.dataset.theme = localStorage.getItem("erp.theme") || "light";</script>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="brand-logo">M</span>
      <span>MORES<b>.</b>&thinsp;HV<small class="brand-sub">Helicopter View</small></span></div>
    <nav id="nav">
      <a href="#/dashboard" data-route="dashboard">&#x25A6; Dashboard</a>
      <a href="#/projecthv" data-route="projecthv">&#x25C9; Project HV</a>
      <a href="#/journals" data-route="journals">&#x2630; Journal Entries</a>
      <a href="#/bank" data-route="bank">&#x21C4; Bank Import</a>
      <a href="#/budgets" data-route="budgets">&#x25CE; Budgets</a>
      <a href="#/investments" data-route="investments">&#x2726; Investments</a>
      <a href="#/projects" data-route="projects">&#x25B3; Projects</a>
      <a href="#/reports" data-route="reports">&#x25A4; Reports</a>
      <a href="#/settings" data-route="settings">&#x2699; Settings</a>
    </nav>
    <div class="sidebar-foot" id="userBox"></div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-field"><span>Company</span>
          <div class="seg-group" id="companyChoice"></div>
        </div>
        <label class="topbar-field">Year
          <select id="yearSelect"></select>
        </label>
      </div>
      <div class="topbar-right">
        <span id="dbBadge" class="db-badge" hidden title="Active database (Settings → Databases to switch)"></span>
        <span id="scopeBadge" class="scope-badge"></span>
        <button class="btn btn-ghost" id="themeBtn" title="Toggle dark / light mode">&#127769;</button>
        <button class="btn btn-ghost" id="logoutBtn">Logout</button>
      </div>
    </header>
    <main id="content" class="content"></main>
  </div>
</div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>
<script src="/static/app.js"></script>
</body>
</html>

name: mores_hub
description: MORES-HUB mobile (Flutter) — wallets, top-up, QRIS, cards.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.0.0
  http: ^1.2.0
  provider: ^6.1.1
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0
  local_auth: ^2.2.0
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
